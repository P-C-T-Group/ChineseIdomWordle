name: Build and Push Docker Image

# 触发条件：推送到 main 分支
on:
  push:
    branches:
      - main
    # 也可以在发布 release 时触发
  release:
    types: [published]
  # 支持手动触发
  workflow_dispatch:

# 仓库只读权限需要
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 获取版本号
      - name: Get version
        id: version
        run: |
          # 判断触发方式
          if [ "${{ github.event_name }}" = "release" ]; then
            # Release 触发：从 release tag 提取主.次版本号，去掉 v 前缀和补丁号
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            # 去掉 v 前缀，然后只取主版本和次版本
            NEW_VERSION=$(echo "$RELEASE_TAG" | sed 's/^v//' | awk -F. '{print $1"."$2}')
            echo "Release triggered, using version: $NEW_VERSION (from tag: $RELEASE_TAG)"
          else
            # 非 Release 触发：获取最新 release 版本，自动递增补丁号
            LATEST_RELEASE_TAG=$(curl -sL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "${{ github.api_url }}/repos/${{ github.repository }}/releases/latest" | \
              jq -r '.tag_name // empty' | sed 's/^v//')
            
            if [ -z "$LATEST_RELEASE_TAG" ]; then
              # 没有 release，使用 0.0 作为基础
              LATEST_MAJOR_MINOR="0.0"
            else
              # 从 release 版本号中提取主.次版本（去掉补丁号）
              LATEST_MAJOR_MINOR=$(echo "$LATEST_RELEASE_TAG" | awk -F. '{print $1"."$2}')
            fi
            
            echo "Latest release tag: $LATEST_RELEASE_TAG"
            echo "Major.Minor version: $LATEST_MAJOR_MINOR"
            
            # 分页拉取所有镜像标签，实时计算当前主.次版本下最大的补丁号
            PAGE=1
            MAX_PATCH=0
            while true; do
              # 获取当前页的补丁号并更新最大值
              PAGE_PATCHES=$(curl -sL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "${{ github.api_url }}/packages/container/c-i-wordle/versions?per_page=100&page=$PAGE" | \
                jq -r '.[].metadata.container.tags[] // empty' 2>/dev/null | grep "^${LATEST_MAJOR_MINOR//./\\.}\\.[0-9]\+$" | sed "s/${LATEST_MAJOR_MINOR//./\\.}\\.//" | sort -n | tail -n1 || echo 0)
              
              if [ "$PAGE_PATCHES" -gt "$MAX_PATCH" ]; then
                MAX_PATCH=$PAGE_PATCHES
              fi
              
              # 如果当前页没有匹配的标签，说明已经遍历完
              if [ "$PAGE_PATCHES" -eq 0 ]; then
                break
              fi
              
              PAGE=$((PAGE + 1))
              # 最多查 10 页，避免无限循环
              if [ $PAGE -gt 10 ]; then
                break
              fi
            done
            
            PATCH=$((MAX_PATCH + 1))
            
            NEW_VERSION="${LATEST_MAJOR_MINOR}.${PATCH}"
            echo "Non-release triggered, new version: $NEW_VERSION"
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # 设置 QEMU（用于多架构构建）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 生成构建元数据（北京时间、短 commit SHA、稳定版号）
      - name: Generate build metadata
        id: meta
        run: |
          BUILD_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S CST')
          BUILD_TIME_ISO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHORT_SHA="${GITHUB_SHA::12}"
          STABLE_VERSION="${{ steps.version.outputs.version }}"
          # 取主.次版本（去掉补丁号），如 2.0.1 -> 2.0
          STABLE_MAJOR_MINOR=$(echo "$STABLE_VERSION" | awk -F. '{print $1"."$2}')

          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"
          echo "build_time_iso=$BUILD_TIME_ISO" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "stable_version=$STABLE_MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          echo "full_version=$STABLE_VERSION" >> "$GITHUB_OUTPUT"

          echo "Build time: $BUILD_TIME"
          echo "Commit: $SHORT_SHA"
          echo "Stable version: $STABLE_MAJOR_MINOR"

      # 配置国内镜像源加速构建
      - name: Configure Docker mirror
        run: |
          echo '{"registry-mirrors": ["https://docker.mirrors.ustc.edu.cn", "https://hub-mirror.c.163.com"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      # 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64  # 多架构支持，可根据需要删减
          push: true
          tags: |
            ghcr.io/p-c-t-group/c-i-wordle:${{ steps.version.outputs.version }}
            ghcr.io/p-c-t-group/c-i-wordle:latest
          labels: |
            org.opencontainers.image.title=ChineseIdomWordle
            org.opencontainers.image.description=镜像由 GitHub Actions 于 ${{ steps.meta.outputs.build_time }} 自动构建 | 构建来源提交: ${{ steps.meta.outputs.short_sha }} | 当前稳定版: ${{ steps.meta.outputs.stable_version }}
            org.opencontainers.image.version=${{ steps.meta.outputs.full_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_time_iso }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.vendor=P-C-T-Group
            org.opencontainers.image.licenses=MIT
          annotations: |
            index,manifest:org.opencontainers.image.title=ChineseIdomWordle
            index,manifest:org.opencontainers.image.description=镜像由 GitHub Actions 于 ${{ steps.meta.outputs.build_time }} 自动构建 | 构建来源提交: ${{ steps.meta.outputs.short_sha }} | 当前稳定版: ${{ steps.meta.outputs.stable_version }}
            index,manifest:org.opencontainers.image.version=${{ steps.meta.outputs.full_version }}
            index,manifest:org.opencontainers.image.revision=${{ github.sha }}
            index,manifest:org.opencontainers.image.created=${{ steps.meta.outputs.build_time_iso }}
            index,manifest:org.opencontainers.image.source=https://github.com/${{ github.repository }}
            index,manifest:org.opencontainers.image.vendor=P-C-T-Group
            index,manifest:org.opencontainers.image.licenses=MIT
          build-args: |
            USE_CN_MIRROR=False
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 关闭 provenance 避免干扰顶层 annotation
          provenance: false

      # 输出结果
      - name: Image pushed
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "  Tags:"
          echo "    ghcr.io/p-c-t-group/c-i-wordle:${{ steps.version.outputs.version }}"
          echo "    ghcr.io/p-c-t-group/c-i-wordle:latest"
