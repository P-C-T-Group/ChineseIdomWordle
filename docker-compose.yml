# =============================================================================
# ChineseIdomWordle Docker Compose 配置
# =============================================================================
# 使用方法:
#   1. 复制并编辑配置:
#      cp config.example.toml config.toml
#      然后编辑 config.toml 进行自定义配置
#   2. 启动服务:
#      docker compose up -d
#   3. 查看日志:
#      docker compose logs -f
#   4. 停止服务:
#      docker compose down
# =============================================================================

services:
  wordle:
    build:
      context: .
      # 构建参数：国内环境构建使用 true（默认），海外构建请设为 false
      args:
        USE_CN_MIRROR: "true"
    image: chinese-idiom-wordle:latest
    container_name: chinese-idiom-wordle
    restart: unless-stopped
    
    # 端口映射：宿主机端口:容器端口
    # 默认容器内监听 8000，可通过 config.toml 中的 [frontend] listen_host 修改
    ports:
      - "8000:8000"
    
    # 挂载配置 - 注释掉相应行可以使用容器内默认值
    volumes:
      # 1. 配置文件挂载（推荐：必须挂载以便自定义配置）
      # 首次启动时如果宿主机 config.toml 不存在，会自动复制默认配置
      - ./config.toml:/app/config.toml
      
      # 2. 数据目录挂载（推荐：持久化数据库和成语库）
      # 包含 SQLite 数据库文件和成语 JSON 库
      - ./data:/app/data
      
      # 3. 前端目录挂载（可选：用于自定义前端）
      # 如需自定义前端页面，取消下面这行的注释
      # - ./client:/app/client
      
      # 4. 日志目录挂载（可选）
      - ./logs:/app/logs
    
    # 环境变量配置（可选，优先级高于 config.toml）
    environment:
      # 数据库配置（使用 SQLite 时无需修改）
      # - WORDLE_DB_TYPE=sqlite
      # - WORDLE_DB_SQLITE_PATH=data/wordle.db
      
      # MySQL 配置示例（如使用 MySQL）
      # - WORDLE_DB_TYPE=mysql
      # - WORDLE_DB_HOST=mysql
      # - WORDLE_DB_PORT=3306
      # - WORDLE_DB_USER=wordle
      # - WORDLE_DB_PASSWORD=your_password
      # - WORDLE_DB_NAME=wordle
      
      # 鉴权配置
      # - WORDLE_AUTH_ENABLED=true
      # - WORDLE_ADMIN_TOKEN_HASH=your_sha256_hash_here
      
      # 日志级别
      - WORDLE_LOG_LEVEL=INFO
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

