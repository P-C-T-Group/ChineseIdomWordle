# =============================================================================
# ChineseIdomWordle Docker Compose 配置
# =============================================================================
# 使用方法:
#   1. 复制并编辑配置:
#      cp config.example.toml config.toml
#      然后编辑 config.toml 进行自定义配置
#   2. 启动服务:
#      docker compose up -d
#   3. 停止服务:
#      docker compose down
# =============================================================================

services:
  wordle:
    # 镜像版本说明：
    # `latest`、`a.b.commit_hash` 可获取由最新提交自动构建的夜间版本
    # `a.b` 获取每个大版本的稳定版镜像，如`2.0`、`2.1`等。
    image: ghcr.io/p-c-t-group/c-i-wordle:latest
    container_name: CIwordle
    restart: unless-stopped
    
    # 端口映射：宿主机端口:容器端口
    # 默认容器内监听 8000，可通过 config.toml 中的 [frontend] listen_host 修改
    ports:
      - "8000:8000"
    
    # 挂载配置 - 注释掉相应行可以使用容器内默认值
    volumes:
      # 1. 配置文件挂载
      # 务必按照本文件头部的说明先复制并编辑配置后再启动容器
      - ./config.toml:/app/config.toml
      
      # 2. 数据目录挂载（持久化 SQLite 数据库、IP2Region 库和成语库）
      # 空目录会自动初始化
      - ./data:/app/data
      
      # 3. 前端目录挂载
      # 空目录会自动初始化，如需使用自动化工具部署 SSL，可在`.well_known`下操作。
      - ./client:/app/client

      # 4. 日志目录
      - ./logs:/app/logs
    
    # 环境变量配置（可选，将覆盖 config.toml 中的配置）
    environment:      
      # MySQL 配置示例（如使用 SQLite 无需在此配置）
      # - WORDLE_DB_TYPE=mysql
      # - WORDLE_DB_HOST=mysql
      # - WORDLE_DB_PORT=3306
      # - WORDLE_DB_USER=wordle
      # - WORDLE_DB_PASSWORD=your_password
      # - WORDLE_DB_NAME=wordle
      
      # 鉴权配置
      # - WORDLE_AUTH_ENABLED=true
      # - WORDLE_ADMIN_TOKEN_HASH=your_sha256_hash

    # 宿主机连接
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

