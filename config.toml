# 实际运行配置（从 config.example.toml 复制并修改）
# 注意：本文件已在 .gitignore 中，不会提交

[database]
type = "mysql"
host = "127.0.0.1"
port = 3306
user = "root"
password = "zhy3976878"
db='test'
#db = "ChineseIdomWordle"
charset = "utf8mb4"

[auth]
enabled = true
# 原 main.py 中硬编码的管理员 Token 哈希
admin_token_hash = "db09d473d4b6461b91bfa47e4fed3ef55e0234df4132ca7a827b0a69e8927cac"
token_file = "token-sha256.txt"

[game.easy]
max_rounds = 12
candidate_count = 10
max_hints = 2

[game.medium]
max_rounds = 10
candidate_count = 14
max_hints = 2

[game.hard]
max_rounds = 8
candidate_count = 20
max_hints = 2

[idiom_library]
easy = "data/easy.json"
medium = "data/medium.json"
hard = "data/hard.json"
characters = "data/character.json"

[logging]
level = "INFO"
dir = "logs"
filename = "app.log"
backup_count = 10

[cleanup]
enabled = true
retention_days = 30
mode = "non_playing"
interval_seconds = 3600
run_on_startup = true

[security]
cors_origins = ["*"]
trusted_proxies = ["127.0.0.1"]
admin_allowlist = []

[leaderboard]
min_games_to_upload = 20
min_new_records_to_append = 5
inactive_days = 90
top_display_limit = 100
cookie_name = "cw_lb_token"
cookie_max_age_days = 365

[frontend]
# 监听地址（格式：host 或 host:port，默认端口 8000）
listen_host = "127.0.0.1"
# 启动模式：default（前端静态文件+后端API同域部署）或 backend（仅后端API）
front_mode = "default"
# 前端 JS 中使用的 API Token
front_token = "test-token"
