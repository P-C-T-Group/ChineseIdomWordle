<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Access-Control-Allow-Origin" content="*">
    <link rel="stylesheet" type="text/css" href="../css/indexStyle.css">
    <link rel="stylesheet" type="text/css" href="../css/top.css">
    <link rel="stylesheet" type="text/css" href="../css/dialog.css">
    <link rel="icon" href="../icons/256.ico" sizes="256x256">
    <script src="../js/dialog.js"></script>
    <script src="../js/top.js"></script>
    <title>成语Wordle - 排行榜</title>
</head>

<body>
    <!--导航栏-->
    <div class="MenuBar">
        <div class="leftMenu">
            <button class="button" onclick="start()" title="主页">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-label="主页">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
            <button class="button" onclick="toggleTheme()" title="切换深浅色模式">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-label="切换主题">
                    <g class="sun-icon">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </g>
                    <path class="moon-icon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
        <div class="title">成语Wordle</div>
        <div class="rightMenu">
            <button class="button" onclick="help()" title="帮助">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-label="帮助">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </button>
            <button class="button active" onclick="rank()" title="排行榜">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-label="排行榜">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
            </button>
            <button class="button" onclick="getHistory()" title="历史记录">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-label="历史记录">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <!-- 排行榜主容器 -->
    <div class="leaderboardContainer">
        <!-- 页头：难度和榜单类型切换 -->
        <div class="lbHeader">
            <div class="lbTabs">
                <button class="lbTab active" data-board="total" onclick="switchBoard('total')">总榜</button>
                <button class="lbTab" data-board="daily" onclick="switchBoard('daily')">日榜</button>
            </div>
            <div class="lbDifficulty">
                <button class="lbDiffBtn active" data-diff="easy" onclick="switchDifficulty('easy')">简单</button>
                <button class="lbDiffBtn" data-diff="medium" onclick="switchDifficulty('medium')">中等</button>
                <button class="lbDiffBtn" data-diff="hard" onclick="switchDifficulty('hard')">困难</button>
            </div>
        </div>

        <!-- 用户存档状态卡片 -->
        <div class="profileCard" id="profileCard" style="display: none;">
            <div class="profileHeader">
                <div class="profileInfo">
                    <span class="profileName" id="profileName">-</span>
                    <span class="profileId" id="profileId">ID: -</span>
                    <span class="profileLocation" id="profileLocation">📍 -</span>
                </div>
                <div class="profileActions">
                    <button class="btnSmall primary" onclick="showUploadDialog()">上传/追加战绩</button>
                    <button class="btnSmall danger" onclick="confirmDeleteProfile()">删除存档</button>
                </div>
            </div>
            <div class="profileStats" id="profileStats"></div>
        </div>

        <!-- 未存档提示 -->
        <div class="noProfileCard" id="noProfileCard">
            <p>📊 您还没有创建排行榜存档</p>
            <p class="hint">完成20局以上游戏后即可上传战绩，创建您的专属存档</p>
            <button class="btnPrimary" onclick="showUploadDialog()">上传战绩创建存档</button>
        </div>

        <!-- 总榜：三种榜单切换 -->
        <div class="boardTypeTabs" id="totalBoardTabs">
            <button class="boardTypeBtn active" data-type="wins" onclick="switchBoardType('wins')">胜利数</button>
            <button class="boardTypeBtn" data-type="win_rate" onclick="switchBoardType('win_rate')">胜率</button>
            <button class="boardTypeBtn" data-type="avg_rounds" onclick="switchBoardType('avg_rounds')">平均回合</button>
        </div>

        <!-- 日榜日期显示 -->
        <div class="dailyDate" id="dailyDate" style="display: none;">
            <span>📅 今日挑战排行榜</span>
        </div>

        <!-- 排行榜列表 -->
        <div class="lbListContainer">
            <div class="lbList" id="lbList">
                <div class="loading">加载中...</div>
            </div>
            <!-- 我的名次 -->
            <div class="myRank" id="myRank" style="display: none;"></div>
        </div>
    </div>

    <!-- 上传战绩弹窗 -->
    <div class="modal-overlay" id="uploadModal" onclick="closeUploadModal(event)">
        <div class="modal-content uploadModalContent" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="uploadModalTitle">上传战绩到排行榜</h2>
                <button class="close-btn" onclick="closeUploadModal()" title="关闭">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="uploadForm">
                    <div class="formGroup">
                        <label for="usernameInput">用户名（32字以内）</label>
                        <input type="text" id="usernameInput" maxlength="32" placeholder="输入您的用户名">
                    </div>
                    <div class="uploadStats" id="uploadStats"></div>
                    <div class="uploadTips">
                        <p>💡 提示：</p>
                        <ul>
                            <li>首次上传至少需要20局对战记录</li>
                            <li>后续追加至少需要5局新记录</li>
                            <li>胜率榜仅显示游戏10局以上的用户</li>
                            <li>战绩将保存在您的浏览器cookie中</li>
                            <li>每日挑战每天仅第一次胜利可登日榜，首次失败当日无法再上榜</li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; gap: 0.5rem;">
                <button class="button secondary-btn" onclick="closeUploadModal()">取消</button>
                <button class="button primary-btn" onclick="doUpload()">确认上传</button>
            </div>
        </div>
    </div>

    <!-- 历史记录弹窗 -->
    <div class="modal-overlay" id="historyModal" onclick="closeHistory(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2>历史记录</h2>
                <button class="close-btn" onclick="closeHistory()" title="关闭">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="historyList"></div>
            <div class="modal-footer" id="historyFooter" style="display:none; gap: 0.5rem;">
                <button class="button secondary-btn" onclick="clearHistory()">清空记录</button>
                <button class="button primary-btn" onclick="closeHistory(); showUploadDialog()">上传到排行榜</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <span>成语Wordle ©<a href="https://whj.zdeweb.cn" target="_blank">物化技</a> 2026 ｜ <a
                href="https://github.com/P-C-T-Group/ChineseIdomWordle" target="_blank">GitHub</a> ｜ <a
                href="https://doc.wordle.whj.zdeweb.cn" target="_blank">API文档</a></span>
    </footer>
</body>

</html>
