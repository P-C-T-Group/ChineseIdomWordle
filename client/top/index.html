<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Access-Control-Allow-Origin" content="*">
    <link rel="stylesheet" type="text/css" href="../css/indexStyle.css">
    <link rel="stylesheet" type="text/css" href="../css/top.css">
    <link rel="icon" href="../icons/256.ico" sizes="256x256">
    <script src="../js/top.js"></script>
    <title>成语Wordle - 排行榜</title>
</head>

<body>
    <!--导航栏-->
    <div class="MenuBar">
        <div class="leftMenu">
            <button class="button" onclick="start()" title="主页">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-label="主页">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
            <button class="button" onclick="toggleTheme()" title="切换深浅色模式">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-label="切换主题">
                    <g class="sun-icon">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </g>
                    <path class="moon-icon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
        <div class="title">成语Wordle</div>
        <div class="rightMenu">
            <button class="button" onclick="help()" title="帮助">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-label="帮助">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </button>
            <button class="button" onclick="rank()" title="排行榜">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-label="排行榜">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
            </button>
            <button class="button" onclick="getHistory()" title="历史记录">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-label="历史记录">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <!-- 装修中提示 -->
    <div class="constructionContainer">
        <div class="constructionIcon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
        </div>
        <h1 class="constructionTitle">正在装修中</h1>
        <p class="constructionText">SQL不会写喵，过几天再来吧～</p>
    </div>

    <!-- 历史记录弹窗 -->
    <div class="modal-overlay" id="historyModal" onclick="closeHistory(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2>历史记录</h2>
                <button class="close-btn" onclick="closeHistory()" title="关闭">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="historyList">
                <!-- 历史记录动态填充 -->
            </div>
            <div class="modal-footer" id="historyStats" style="display:none">
                <button class="button secondary-btn" onclick="clearHistory()">清空记录</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <span>成语Wordle ©<a href="https://whj.zdeweb.cn" target="_blank">物化技</a> 2026 ｜ <a href="https://github.com/P-C-T-Group/ChineseIdomWordle" target="_blank">GitHub</a> ｜ <a href="https://doc.wordle.whj.zdeweb.cn" target="_blank">API文档</a></span>
    </footer>
</body>

</html>
