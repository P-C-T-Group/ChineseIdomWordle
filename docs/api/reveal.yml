openapi: 3.0.1
info:
  title: ''
  description: ''
  version: 1.0.0
paths:
  /api/games/{game_id}/reveal:
    get:
      summary: 揭晓答案
      deprecated: false
      description: |-
        强制揭晓本局游戏的答案，并标记游戏为负
        只有处于playing状态的对局可以使用本接口
      tags:
        - api
      parameters:
        - name: game_id
          in: path
          description: 游戏ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  status:
                    type: string
                    title: 请求状态
                  gameId:
                    type: string
                    title: 游戏ID
                  mode:
                    type: string
                    title: 模式
                  difficulty:
                    type: string
                    title: 难度
                  maxRounds:
                    type: integer
                    title: 最大轮数
                  candidateChars:
                    type: array
                    items:
                      type: string
                    title: 候选字
                  gameStatus:
                    type: string
                    title: 游戏状态
                    description: 应当为lost
                  guesses:
                    type: array
                    items:
                      type: array
                      items:
                        type: object
                        properties:
                          char:
                            type: string
                          status:
                            type: string
                        required:
                          - char
                          - status
                        x-apifox-orders:
                          - char
                          - status
                    title: 猜测列表
                  round:
                    type: integer
                    title: 已用轮数
                  answer:
                    type: string
                    title: 正确答案
                  pinyin:
                    type: string
                    title: 答案拼音
                  explanation:
                    type: string
                    title: 解释
                  hintsUsed:
                    type: integer
                    title: 提示次数
                  maxHints:
                    type: integer
                    title: 最大提示次数
                  revealedPinyins:
                    type: array
                    items:
                      type: string
                    title: 已提示拼音
                required:
                  - code
                  - status
                  - gameId
                  - mode
                  - difficulty
                  - maxRounds
                  - candidateChars
                  - gameStatus
                  - guesses
                  - round
                  - answer
                  - pinyin
                  - explanation
                  - hintsUsed
                  - maxHints
                  - revealedPinyins
                x-apifox-orders:
                  - code
                  - status
                  - gameId
                  - mode
                  - difficulty
                  - maxRounds
                  - candidateChars
                  - gameStatus
                  - guesses
                  - round
                  - answer
                  - pinyin
                  - explanation
                  - hintsUsed
                  - maxHints
                  - revealedPinyins
              example:
                code: 200
                status: success
                game_id: 152aa89b-8474-4591-ad00-b4187e36bc25
                mode: daily
                difficulty: easy
                max_rounds: 20
                candidate_chars:
                  - 万
                  - 高
                  - 相
                  - 能
                  - 所
                  - 可
                  - 手
                  - 力
                  - 眼
                  - 及
                game_status: lost
                guesses:
                  - - char: 万
                      status: absent
                    - char: 高
                      status: absent
                    - char: 相
                      status: absent
                    - char: 能
                      status: present
                round: 1
                answer: 力所能及
                pinyin: lì suǒ néng jí
                explanation: 力体力，能力；及达到。在自己力量的限度内所能做到的。
                hints_used: 2
                max_hints: 2
                revealed_pinyins:
                  - suǒ
          headers: {}
          x-apifox-name: 成功
        '400':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                    x-apifox-mock: '{{$number.int}}'
                  status:
                    type: string
                    x-apifox-mock: '{{$string.alpha}}'
                    title: 请求状态
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              examples:
                '3':
                  summary: 传入数据校验失败
                  value:
                    code: 400
                    status: fali
                    message: 字"一"不在候选字中
                '4':
                  summary: 游戏不存在
                  value:
                    code: 400
                    status: fail
                    message: 游戏不存在
                '5':
                  summary: 游戏状态不符合要求
                  value:
                    code: 400
                    status: fail
                    message: 本局游戏已结束,状态不为playing
          headers: {}
          x-apifox-name: 请求内容未预期
        '401':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                    description: http标准响应代码
                    x-apifox-mock: '{{$number.int}}'
                  status:
                    type: string
                    title: 请求状态
                    x-apifox-mock: '{{$string.alpha}}'
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 401
                status: fail
                message: 缺少Authorization请求头
          headers: {}
          x-apifox-name: 未认证
        '403':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                    x-apifox-mock: '{{$number.int}}'
                  status:
                    type: string
                    title: 请求状态
                    x-apifox-mock: '{{$string.alpha}}'
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 403
                status: fail
                message: not admin
          headers: {}
          x-apifox-name: 无权限
        '405':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  message:
                    type: string
                    title: 详细信息
                  status:
                    type: string
                    title: 请求状态
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 405
                status: fail
                message: Method Not Allowed
          headers: {}
          x-apifox-name: 方法不许可
        '422':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  status:
                    type: string
                    title: 请求状态
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 422
                status: fail
                message: guess 参数非法：Value error, 必须输入4字成语
          headers: {}
          x-apifox-name: 请求体有误
        '500':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  status:
                    type: string
                    title: 请求状态
                  message:
                    type: string
                    title: 详细信息
                required:
                  - code
                  - status
                x-apifox-orders:
                  - code
                  - status
                  - message
              example:
                code: 500
                status: fail
                message: 服务器内部异常，请稍后重试
          headers: {}
          x-apifox-name: 内部错误
      security: []
      x-apifox-folder: api
      x-apifox-status: released
      x-run-in-apifox: https://app.apifox.com/web/project/8546191/apis/api-485298891-run
components:
  schemas: {}
  securitySchemes:
    普通token鉴权:
      type: bearer
      scheme: bearer
    管理员token验证:
      type: bearer
      scheme: bearer
servers:
  - url: http://127.0.0.1:8000
    description: 测试环境
security: []