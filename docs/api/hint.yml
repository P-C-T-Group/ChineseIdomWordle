paths:
  /api/games/{game_id}/hints:
    get:
      summary: 查看提示
      deprecated: false
      description: |-
        可以调取接口获得一个提示。每局游戏默认最多调取两次。
        可使用次数由`max_hints`字段定义。
        - 第一次：提示一个字拼音
        - 第二次：提示成语的释义
        - 后续次数（如果有）：继续揭示其他拼音
      operationId: api_use_hint_api_games__game_id__hints_post
      tags:
        - api
      parameters:
        - name: game_id
          in: path
          description: ''
          required: true
          example: '{{$string.uuid}}'
          schema:
            type: string
            title: Game Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  status:
                    type: string
                    title: 请求状态
                  gameId:
                    type: string
                    title: 游戏id
                  revealedPinyins:
                    type: array
                    items:
                      type: string
                    title: 已提示拼音
                  explanation:
                    type: string
                    title: 已提示解释
                    nullable: true
                  hintsUsed:
                    type: integer
                    title: 已用提示次数
                  maxHints:
                    type: integer
                    title: 最大提示次数
                required:
                  - code
                  - status
                  - gameId
                  - revealedPinyins
                  - hintsUsed
                  - maxHints
                x-apifox-orders:
                  - code
                  - status
                  - gameId
                  - revealedPinyins
                  - explanation
                  - hintsUsed
                  - maxHints
              example:
                code: 200
                status: success
                game_id: 152aa89b-8474-4591-ad00-b4187e36bc25
                revealed_pinyins:
                  - suǒ
                explanation: 力体力，能力；及达到。在自己力量的限度内所能做到的。
                hints_used: 2
                max_hints: 2
          headers: {}
          x-apifox-name: OK
        '400':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
