paths:
  /api/admin/config/reload:
    get:
      summary: 管理员：重载配置
      deprecated: false
      description: 热重载本地配置文件
      tags:
        - admin
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  status:
                    type: string
                    title: 请求状态
                  applied:
                    type: array
                    items:
                      type: string
                    title: 应用成功的模块
                    nullable: true
                  idiomsReloaded:
                    type: integer
                    title: 总成语数量
                  requiresRestart:
                    type: array
                    items:
                      type: string
                    title: 需要重启冷重载的模块
                    description: CORS只有在重启时才能更新
                required:
                  - code
                  - status
                  - idiomsReloaded
                  - applied
                x-apifox-orders:
                  - code
                  - status
                  - applied
                  - idiomsReloaded
                  - requiresRestart
              example:
                code: 200
                status: success
                applied:
                  - logging
                  - idiom_library
                  - auth
                  - security
                  - game
                  - database
                idioms_reloaded: 22667
                requires_restart:
                  - security.cors_origins（CORS 中间件在启动时实例化，无法热更新）
          headers: {}
          x-apifox-name: 成功
        '400':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                    x-apifox-mock: '{{$number.int}}'
                  status:
                    type: string
                    x-apifox-mock: '{{$string.alpha}}'
                    title: 请求状态
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              examples:
                '3':
                  summary: 传入数据校验失败
                  value:
                    code: 400
                    status: fali
                    message: 字"一"不在候选字中
                '4':
                  summary: 游戏不存在
                  value:
                    code: 400
                    status: fail
                    message: 游戏不存在
                '5':
                  summary: 游戏状态不符合要求
                  value:
                    code: 400
                    status: fail
                    message: 本局游戏已结束,状态不为playing
          headers: {}
          x-apifox-name: 请求内容未预期
