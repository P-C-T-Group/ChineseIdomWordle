openapi: 3.0.1
info:
  title: ''
  description: ''
  version: 1.0.0
paths:
  /api/admin/tokens/delete:
    post:
      summary: 管理员：删除token
      deprecated: false
      description: 删除已存在token
      tags:
        - admin
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                identifiers:
                  type: array
                  items:
                    type: string
                    description: "可以使用的识别器如下：\n- `id:<数字>`\t按自增 id（显式前缀）\n- `sha:<64位hex>`\t按 sha256 摘要（显式前缀）\n- `raw:<原文>`\t按 token 原文（会计算 sha256，显式前缀）\n- 纯数字（无前缀）\t按 id\n- 恰好 64 位十六进制（无前缀）\t按 sha256hash\n- 其他字符串\t当作原文计算 sha256"
                    nullable: true
                  title: 识别器
              required:
                - identifiers
              x-apifox-orders:
                - identifiers
            example:
              identifiers:
                - id:1
                - sha:abcdefghijklmnopqrstuvwxyz1234567890
                - my-raw-token
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  status:
                    type: string
                    title: 请求状态
                  total:
                    type: integer
                    title: 成功的条目总数
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        identifier:
                          type: string
                          title: 传入的识别器
                        deleted:
                          type: integer
                          title: 删除结果
                          description: 1:成功，0:失败
                      required:
                        - identifier
                        - deleted
                      x-apifox-orders:
                        - identifier
                        - deleted
                    title: 结果详细列表
                required:
                  - code
                  - status
                  - total
                  - results
                x-apifox-orders:
                  - code
                  - status
                  - total
                  - results
              example:
                code: 200
                status: success
                total: 1
                results:
                  - identifier: id:1
                    deleted: 1
                  - identifier: sha:abcdefghijklmnopqrstuvwxyz1234567890
                    deleted: 0
                  - identifier: my-raw-token
                    deleted: 0
          headers: {}
          x-apifox-name: 成功
        '400':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                    x-apifox-mock: '{{$number.int}}'
                  status:
                    type: string
                    x-apifox-mock: '{{$string.alpha}}'
                    title: 请求状态
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              examples:
                '3':
                  summary: 传入数据校验失败
                  value:
                    code: 400
                    status: fali
                    message: 字"一"不在候选字中
                '4':
                  summary: 游戏不存在
                  value:
                    code: 400
                    status: fail
                    message: 游戏不存在
                '5':
                  summary: 游戏状态不符合要求
                  value:
                    code: 400
                    status: fail
                    message: 本局游戏已结束,状态不为playing
          headers: {}
          x-apifox-name: 请求内容未预期
        '401':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                    description: http标准响应代码
                    x-apifox-mock: '{{$number.int}}'
                  status:
                    type: string
                    title: 请求状态
                    x-apifox-mock: '{{$string.alpha}}'
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 401
                status: fail
                message: 缺少Authorization请求头
          headers: {}
          x-apifox-name: 未认证
        '403':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                    x-apifox-mock: '{{$number.int}}'
                  status:
                    type: string
                    title: 请求状态
                    x-apifox-mock: '{{$string.alpha}}'
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 403
                status: fail
                message: not admin
          headers: {}
          x-apifox-name: 无权限
        '405':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  message:
                    type: string
                    title: 详细信息
                  status:
                    type: string
                    title: 请求状态
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 405
                status: fail
                message: Method Not Allowed
          headers: {}
          x-apifox-name: 方法不许可
        '422':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  status:
                    type: string
                    title: 请求状态
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 422
                status: fail
                message: guess 参数非法：Value error, 必须输入4字成语
          headers: {}
