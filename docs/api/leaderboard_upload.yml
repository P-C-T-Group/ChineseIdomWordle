openapi: 3.1.0
info:
  title: ChineseIdomWordle API
  version: 1.0.0
  description: 成语Wordle游戏API文档 - 自动从FastAPI生成
paths:
  /api/leaderboard/upload:
    post:
      summary: Api Upload Leaderboard
      description: 首次上传战绩到排行榜
      operationId: api_upload_leaderboard_api_leaderboard_upload_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadRecordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AdminCleanRequest:
      properties:
        retention_days:
          anyOf:
          - type: integer
            maximum: 3650.0
            minimum: 1.0
          - type: 'null'
          title: Retention Days
          description: 清理天数前创建的对局
        mode:
          anyOf:
          - $ref: '#/components/schemas/CleanupMode'
          - type: 'null'
          description: 清理模式：all / non_playing
      type: object
      title: AdminCleanRequest
      description: '管理员立即清理接口请求体


        - retention_days: 清理多少天前创建的对局；留空则使用配置中的值

        - mode: 清理模式，all（清理所有过期对局）或 non_playing（仅清理非 playing 的过期对局）；留空则使用配置中的值'
    AdminDeleteUserRequest:
      properties:
        user_id:
          type: string
          title: User Id
      type: object
      required:
      - user_id
      title: AdminDeleteUserRequest
      description: 管理员删除用户请求
    CharFeedback:
      properties:
        char:
          type: string
          title: Char
        status:
          type: string
          title: Status
      type: object
      required:
      - char
      - status
      title: CharFeedback
    CleanupMode:
      type: string
      enum:
      - all
      - non_playing
      title: CleanupMode
      description: '对局清理模式


        - all: 清理所有过期对局，不论状态

        - non_playing: 仅清理状态不为 playing 的过期对局（won / lost）'
    CreateGameRequest:
      properties:
        code:
          type: integer
          title: Code
          default: 200
        status:
          type: string
          title: Status
          default: success
        mode:
          $ref: '#/components/schemas/GameMode'
          default: unlimited
        difficulty:
          $ref: '#/components/schemas/Difficulty'
          default: medium
      type: object
      title: CreateGameRequest
    CreateGameResponse:
      properties:
        code:
          type: integer
          title: Code
          default: 200
        status:
          type: string
          title: Status
          default: success
        game_id:
          type: string
          title: Game Id
        mode:
          $ref: '#/components/schemas/GameMode'
        difficulty:
          $ref: '#/components/schemas/Difficulty'
        max_rounds:
          type: integer
          title: Max Rounds
        candidate_chars:
          items:
            type: string
          type: array
          title: Candidate Chars
        game_status:
          type: string
          title: Game Status
        guesses:
          items:
            items:
              $ref: '#/components/schemas/CharFeedback'
            type: array
          type: array
          title: Guesses
          default: []
      type: object
      required:
      - game_id
      - mode
      - difficulty
      - max_rounds
      - candidate_chars
      - game_status
      title: CreateGameResponse
    Difficulty:
      type: string
      enum:
      - easy
      - medium
      - hard
      title: Difficulty
    GameMode:
      type: string
      enum:
      - daily
      - unlimited
      title: GameMode
    GameRecordItem:
      properties:
        game_id:
          type: string
          title: Game Id
          description: 对局ID，用于去重
          default: ''
        mode:
          type: string
          enum:
          - daily
          - unlimited
          title: Mode
          default: unlimited
        difficulty:
          $ref: '#/components/schemas/Difficulty'
        status:
          type: string
          enum:
          - won
          - lost
          title: Status
        rounds:
          type: integer
          maximum: 50.0
          minimum: 1.0
          title: Rounds
          description: 用时回合数
        timestamp:
          type: integer
          minimum: 0.0
          title: Timestamp
          description: 对局时间戳（毫秒）
      type: object
      required:
      - difficulty
      - status
      - rounds
      - timestamp
      title: GameRecordItem
      description: 单局对局记录（由前端历史记录上传）
    GameStateResponse:
      properties:
        code:
          type: integer
          title: Code
          default: 200
        status:
          type: string
          title: Status
          default: success
        game_id:
          type: string
          title: Game Id
        mode:
          $ref: '#/components/schemas/GameMode'
        difficulty:
          $ref: '#/components/schemas/Difficulty'
        max_rounds:
          type: integer
          title: Max Rounds
        candidate_chars:
          items:
            type: string
          type: array
          title: Candidate Chars
        game_status:
          type: string
          title: Game Status
        guesses:
          items:
            items:
              $ref: '#/components/schemas/CharFeedback'
            type: array
          type: array
          title: Guesses
          default: []
        round:
          type: integer
          title: Round
          default: 0
        answer:
          anyOf:
          - type: string
          - type: 'null'
          title: Answer
        pinyin:
          anyOf:
          - type: string
          - type: 'null'
          title: Pinyin
        explanation:
          anyOf:
          - type: string
          - type: 'null'
          title: Explanation
        hints_used:
          type: integer
          title: Hints Used
          default: 0
        max_hints:
          type: integer
          title: Max Hints
          default: 2
        revealed_pinyins:
          items:
            type: string
          type: array
          title: Revealed Pinyins
          default: []
      type: object
      required:
      - game_id
      - mode
      - difficulty
      - max_rounds
      - candidate_chars
      - game_status
      title: GameStateResponse
    GuessRequest:
      properties:
        guess:
          type: string
          title: Guess
      type: object
      required:
      - guess
      title: GuessRequest
    GuessResponse:
      properties:
        code:
          type: integer
          title: Code
          default: 200
        status:
          type: string
          title: Status
          default: success
        game_id:
          type: string
          title: Game Id
        game_status:
          type: string
          title: Game Status
        guess:
          type: string
          title: Guess
        result:
          items:
            $ref: '#/components/schemas/CharFeedback'
          type: array
          title: Result
        round:
          type: integer
          title: Round
        max_rounds:
          type: integer
          title: Max Rounds
        answer:
          anyOf:
          - type: string
          - type: 'null'
          title: Answer
        pinyin:
          anyOf:
          - type: string
          - type: 'null'
          title: Pinyin
        explanation:
          anyOf:
          - type: string
          - type: 'null'
          title: Explanation
      type: object
      required:
      - game_id
      - game_status
      - guess
      - result
      - round
      - max_rounds
      title: GuessResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HintResponse:
      properties:
        code:
          type: integer
          title: Code
          default: 200
        status:
          type: string
          title: Status
          default: success
        game_id:
          type: string
          title: Game Id
        revealed_pinyins:
          items:
            type: string
          type: array
          title: Revealed Pinyins
          default: []
        explanation:
          anyOf:
          - type: string
          - type: 'null'
          title: Explanation
        hints_used:
          type: integer
          title: Hints Used
        max_hints:
          type: integer
          title: Max Hints
      type: object
      required:
      - game_id
      - hints_used
      - max_hints
      title: HintResponse
    SubmitDailyRequest:
      properties:
        game_id:
          type: string
          title: Game Id
        difficulty:
          type: string
          title: Difficulty
        won:
          type: boolean
          title: Won
        rounds:
          type: integer
          title: Rounds
      type: object
      required:
      - game_id
      - difficulty
      - won
      - rounds
      title: SubmitDailyRequest
      description: 提交日榜成绩请求
    UploadRecordRequest:
      properties:
        username:
          type: string
          maxLength: 32
          minLength: 1
          title: Username
          description: 用户名
        records:
          items:
            $ref: '#/components/schemas/GameRecordItem'
          type: array
          minItems: 1
          title: Records
          description: 对局记录列表
      type: object
      required:
      - username
      - records
      title: UploadRecordRequest
      description: 上传战绩到排行榜的请求体
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
