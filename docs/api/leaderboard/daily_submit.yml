openapi: 3.0.1
info:
  title: ''
  description: ''
  version: 1.0.0
paths:
  /api/leaderboard/daily/submit:
    post:
      summary: 排行存档：提交每日战绩
      deprecated: false
      description: |-
        提交每日挑战成绩到日榜。只有同时满足：

        - 有存档
        - 每日第一次进行每日挑战
        - 成绩为`won`

        才会上传成功。
      operationId: api_submit_daily_api_leaderboard_daily_submit_post
      tags:
        - api/leaderboard
      parameters:
        - name: cw_lb_token
          in: cookie
          description: 用户Token
          required: true
          example: LVoJxxEZVc2ujgJe93yMV3EtmoI5jmEiHTFIzzdj1mE
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                gameId:
                  type: string
                  title: 游戏ID
                difficulty:
                  type: string
                  title: 难度
                won:
                  type: boolean
                  title: 是否胜利
                rounds:
                  type: integer
                  title: 结束回合数
              required:
                - gameId
                - difficulty
                - won
                - rounds
              x-apifox-orders:
                - gameId
                - difficulty
                - won
                - rounds
            example:
              game_id: abcde-uuid-mnpqrst
              difficulty: easy
              won: true
              rounds: 3
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  status:
                    type: string
                    title: 请求状态
                  message:
                    type: string
                    title: 请求信息
                  duplicate:
                    type: boolean
                    title: 是否重复提交
                required:
                  - code
                  - status
                  - message
                  - duplicate
                x-apifox-orders:
                  - code
                  - status
                  - message
                  - duplicate
              example:
                code: 200
                status: success
                message: 今日成绩已提交
                duplicate: false
          headers: {}
          x-apifox-name: 成功
        '400':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                    x-apifox-mock: '{{$number.int}}'
                  status:
                    type: string
                    x-apifox-mock: '{{$string.alpha}}'
                    title: 请求状态
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              examples:
                '3':
                  summary: 传入数据校验失败
                  value:
                    code: 400
                    status: fali
                    message: 字"一"不在候选字中
                '4':
                  summary: 游戏不存在
                  value:
                    code: 400
                    status: fail
                    message: 游戏不存在
                '5':
                  summary: 游戏状态不符合要求
                  value:
                    code: 400
                    status: fail
                    message: 本局游戏已结束,状态不为playing
          headers: {}
          x-apifox-name: 请求内容未预期
        '401':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                    description: http标准响应代码
                    x-apifox-mock: '{{$number.int}}'
                  status:
                    type: string
                    title: 请求状态
                    x-apifox-mock: '{{$string.alpha}}'
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 401
                status: fail
                message: 缺少Authorization请求头
          headers: {}
          x-apifox-name: 未认证
        '403':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                    x-apifox-mock: '{{$number.int}}'
                  status:
                    type: string
                    title: 请求状态
                    x-apifox-mock: '{{$string.alpha}}'
                  message:
                    type: string
                    title: 详细信息
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 403
                status: fail
                message: not admin
          headers: {}
          x-apifox-name: 无权限
        '405':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  code:
                    type: integer
                    title: httpCode
                  message:
                    type: string
                    title: 详细信息
                  status:
                    type: string
                    title: 请求状态
                x-apifox-orders:
                  - code
                  - status
                  - message
                required:
                  - code
                  - status
              example:
                code: 405
                status: fail
                message: Method Not Allowed
          headers: {}
